<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">

<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>Mobile Open World Game</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:black;
font-family:Arial,sans-serif;
touch-action:none;
}

canvas{
display:block;
}

#ui{
position:absolute;
top:10px;
left:10px;
width:280px;
background:rgba(0,0,0,0.75);
padding:14px;
border-radius:14px;
color:white;
z-index:10;
backdrop-filter:blur(10px);
}

input{
width:100%;
margin:8px 0;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:#0099ff;
color:white;
font-weight:bold;
margin-top:10px;
}

#loadingScreen{
position:absolute;
inset:0;
background:black;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
color:white;
z-index:100;
}

#loadingBar{
width:300px;
height:24px;
background:#222;
border-radius:20px;
overflow:hidden;
margin-top:20px;
}

#loadingFill{
width:0%;
height:100%;
background:#00aaff;
}

#joystick{
position:absolute;
left:max(20px, env(safe-area-inset-left));
bottom:max(20px, env(safe-area-inset-bottom));
width:140px;
height:140px;
border-radius:50%;
background:rgba(255,255,255,0.08);
z-index:30;
}

#stick{
position:absolute;
left:40px;
top:40px;
width:60px;
height:60px;
border-radius:50%;
background:rgba(255,255,255,0.5);
}

#cameraPad{
position:absolute;
right:0;
top:0;
width:50%;
height:100%;
z-index:25;
}

#jump{
position:absolute;
right:max(25px, env(safe-area-inset-right));
bottom:max(40px, env(safe-area-inset-bottom));
width:90px;
height:90px;
border:none;
border-radius:50%;
background:rgba(0,150,255,0.75);
color:white;
font-size:20px;
font-weight:bold;
z-index:30;
}

#attack{
position:absolute;
right:130px;
bottom:55px;
width:85px;
height:85px;
border:none;
border-radius:50%;
background:rgba(255,50,50,0.8);
color:white;
font-size:16px;
font-weight:bold;
z-index:30;
}

@media screen and (orientation:landscape){

body::before{
content:"Rotate Phone Vertically";
position:fixed;
inset:0;
background:black;
color:white;
display:flex;
justify-content:center;
align-items:center;
font-size:32px;
z-index:99999;
}

}
</style>
</head>

<body>

<div id="ui">

<h2>Upload Assets</h2>

<label>Map (.glb)</label>
<input type="file" id="mapInput" accept=".glb">

<label>Player (.glb)</label>
<input type="file" id="playerInput" accept=".glb">

<label>Enemy (.glb)</label>
<input type="file" id="enemyInput" accept=".glb">

<label>NPC (.glb)</label>
<input type="file" id="npcInput" accept=".glb">

<button id="startBtn">START GAME</button>

</div>

<div id="loadingScreen">

<div id="loadingText">Loading 0%</div>

<div id="loadingBar">
<div id="loadingFill"></div>
</div>

</div>

<div id="joystick">
<div id="stick"></div>
</div>

<div id="cameraPad"></div>

<button id="jump">JUMP</button>
<button id="attack">ATTACK</button>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/utils/SkeletonUtils.js"></script>

<script>

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
5000
);

const renderer = new THREE.WebGLRenderer({
antialias:false,
powerPreference:"high-performance"
});

renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,1.5));

document.body.appendChild(renderer.domElement);

scene.add(new THREE.HemisphereLight(0xffffff,0x444444,1.5));

const sun = new THREE.DirectionalLight(0xffffff,2);
sun.position.set(20,40,20);
scene.add(sun);

const loader = new THREE.GLTFLoader();
const clock = new THREE.Clock();

let player;
let playerMixer;

let idleAction;
let walkAction;
let attackAction;
let currentAction;

let enemies = [];
let enemyMixers = [];

let npc;

let mapColliders = [];

let moveForward = 0;
let moveSide = 0;

let velocityY = 0;
let grounded = false;
let isAttacking = false;

let cameraYaw = 0;
let cameraPitch = 0.2;

const raycaster = new THREE.Raycaster();

function fadeToAction(action,duration=0.2){

if(currentAction === action) return;

if(currentAction){

currentAction.fadeOut(duration);

}

action.reset().fadeIn(duration).play();

currentAction = action;
}

function collectColliders(root){

const arr = [];

root.traverse(o=>{

if(o.isMesh){

o.castShadow = true;
o.receiveShadow = true;

arr.push(o);

}

});

return arr;
}

function getGroundHit(x,z,startY){

raycaster.set(
new THREE.Vector3(x,startY,z),
new THREE.Vector3(0,-1,0)
);

const hits = raycaster.intersectObjects(mapColliders,true);

return hits.length ? hits[0] : null;
}

function snapObjectToGround(object){

const hit = getGroundHit(
object.position.x,
object.position.z,
object.position.y + 50
);

if(hit){

object.position.y = hit.point.y + 0.02;

}
}

function loadModel(file){

return new Promise((resolve,reject)=>{

const url = URL.createObjectURL(file);

loader.load(
url,
gltf=>resolve(gltf),
undefined,
err=>reject(err)
);

});

}

document.getElementById("startBtn").onclick = async ()=>{

if(document.documentElement.requestFullscreen){

document.documentElement.requestFullscreen();

}

const mapFile = document.getElementById("mapInput").files[0];
const playerFile = document.getElementById("playerInput").files[0];
const enemyFile = document.getElementById("enemyInput").files[0];
const npcFile = document.getElementById("npcInput").files[0];

if(!mapFile || !playerFile || !enemyFile || !npcFile){

alert("Upload all GLB files");
return;

}

document.getElementById("loadingScreen").style.display = "flex";

const mapGLTF = await loadModel(mapFile);
scene.add(mapGLTF.scene);
mapColliders = collectColliders(mapGLTF.scene);

const playerGLTF = await loadModel(playerFile);

player = playerGLTF.scene;
player.position.set(0,5,0);
player.rotation.y = Math.PI;

scene.add(player);

if(playerGLTF.animations.length >= 3){

playerMixer = new THREE.AnimationMixer(player);

idleAction = playerMixer.clipAction(playerGLTF.animations[0]);
walkAction = playerMixer.clipAction(playerGLTF.animations[1]);
attackAction = playerMixer.clipAction(playerGLTF.animations[2]);

idleAction.play();
currentAction = idleAction;

}

snapObjectToGround(player);

const enemyGLTF = await loadModel(enemyFile);

for(let i=0;i<5;i++){

const enemy = THREE.SkeletonUtils.clone(enemyGLTF.scene);

enemy.position.set(
(Math.random()-0.5)*30,
5,
(Math.random()-0.5)*30
);

scene.add(enemy);

enemies.push(enemy);

if(enemyGLTF.animations.length){

const mixer = new THREE.AnimationMixer(enemy);

mixer.clipAction(enemyGLTF.animations[0]).play();

enemyMixers.push(mixer);

}

snapObjectToGround(enemy);

}

const npcGLTF = await loadModel(npcFile);

npc = npcGLTF.scene;
npc.position.set(-10,5,15);

scene.add(npc);

snapObjectToGround(npc);

document.getElementById("ui").style.display = "none";
document.getElementById("loadingScreen").style.display = "none";

};

function updatePlayer(delta){

if(!player) return;

const speed = 0.14;

const forward = new THREE.Vector3(
-Math.sin(cameraYaw),
0,
-Math.cos(cameraYaw)
);

const right = new THREE.Vector3(
Math.cos(cameraYaw),
0,
-Math.sin(cameraYaw)
);

const moveDir = new THREE.Vector3();

moveDir.add(forward.clone().multiplyScalar(moveForward));
moveDir.add(right.clone().multiplyScalar(moveSide));

const isMoving = moveDir.lengthSq() > 0.0001;

if(isMoving && !isAttacking){

fadeToAction(walkAction);

moveDir.normalize();

player.position.add(moveDir.multiplyScalar(speed));

const targetYaw = Math.atan2(moveDir.x,moveDir.z);

player.rotation.y +=
(targetYaw - player.rotation.y) * 0.18;

}else if(!isMoving && !isAttacking){

fadeToAction(idleAction);

}

velocityY -= 0.015;
player.position.y += velocityY;

const hit = getGroundHit(
player.position.x,
player.position.z,
player.position.y + 5
);

if(hit){

const groundY = hit.point.y + 0.02;

if(player.position.y <= groundY){

player.position.y = groundY;
velocityY = 0;
grounded = true;

}

}

const camPos = new THREE.Vector3(
player.position.x + Math.sin(cameraYaw) * 4,
player.position.y + 2 + cameraPitch * 3,
player.position.z + Math.cos(cameraYaw) * 4
);

camera.position.lerp(camPos,0.1);

camera.lookAt(
player.position.x,
player.position.y + 1.5,
player.position.z
);

if(playerMixer){

playerMixer.update(delta);

}
}

function updateEnemies(delta){

for(let i=0;i<enemies.length;i++){

const enemy = enemies[i];

const dir = new THREE.Vector3()
.subVectors(player.position,enemy.position);

const dist = dir.length();

if(dist > 2){

dir.normalize();

enemy.position.add(dir.multiplyScalar(0.03));

enemy.lookAt(player.position);

snapObjectToGround(enemy);

}

if(enemyMixers[i]){

enemyMixers[i].update(delta);

}

}
}

document.getElementById("jump").onclick = ()=>{

if(grounded){

velocityY = 0.3;
grounded = false;

}

};

document.getElementById("attack").onclick = ()=>{

if(isAttacking || !attackAction) return;

isAttacking = true;

fadeToAction(attackAction,0.1);

attackAction.setLoop(THREE.LoopOnce);
attackAction.clampWhenFinished = true;

attackAction.reset();
attackAction.play();

setTimeout(()=>{

isAttacking = false;

if(moveForward !== 0 || moveSide !== 0){

fadeToAction(walkAction);

}else{

fadeToAction(idleAction);

}

},700);

};

function animate(){

requestAnimationFrame(animate);

const delta = clock.getDelta();

updatePlayer(delta);

if(player){

updateEnemies(delta);

}

renderer.render(scene,camera);

}

animate();

window.addEventListener("resize",()=>{

camera.aspect = window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();

renderer.setSize(window.innerWidth,window.innerHeight);

});

const joystick = document.getElementById("joystick");
const stick = document.getElementById("stick");

let joyPointerId = null;

function resetJoystick(){

moveForward = 0;
moveSide = 0;

stick.style.left = "40px";
stick.style.top = "40px";

}

function updateJoystick(e){

const rect = joystick.getBoundingClientRect();

let x = e.clientX - rect.left - rect.width/2;
let y = e.clientY - rect.top - rect.height/2;

const dist = Math.hypot(x,y);

const max = 50;

if(dist > max){

x = (x/dist)*max;
y = (y/dist)*max;

}

stick.style.left = (x+40)+"px";
stick.style.top = (y+40)+"px";

moveSide = x/max;
moveForward = -y/max;

}

joystick.addEventListener("pointerdown",e=>{

joyPointerId = e.pointerId;

updateJoystick(e);

});

joystick.addEventListener("pointermove",e=>{

if(e.pointerId !== joyPointerId) return;

updateJoystick(e);

});

joystick.addEventListener("pointerup",()=>{

resetJoystick();

});

const cameraPad = document.getElementById("cameraPad");

let lastX = 0;
let lastY = 0;
let camPointer = null;

cameraPad.addEventListener("pointerdown",e=>{

camPointer = e.pointerId;

lastX = e.clientX;
lastY = e.clientY;

});

cameraPad.addEventListener("pointermove",e=>{

if(e.pointerId !== camPointer) return;

const dx = e.clientX - lastX;
const dy = e.clientY - lastY;

cameraYaw -= dx * 0.01;

cameraPitch += dy * 0.003;

cameraPitch = Math.max(-0.25,Math.min(0.65,cameraPitch));

lastX = e.clientX;
lastY = e.clientY;

});

</script>

</body>
</html>
